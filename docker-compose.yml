version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gto_frontend
    ports:
      - "3000:3000"
    networks:
      - gto_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gto_backend
    ports:
      - "5000:5000"
    networks:
      - gto_network
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    container_name: gto_mongo
    ports:
      - "27017:27017"
    networks:
      - gto_network

  nginx:
    image: nginx:latest
    container_name: gto_nginx
    ports:
      - "81:81"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - gto_network
    depends_on:
      - frontend
      - backend

networks:
  gto_network:
    driver: bridge
